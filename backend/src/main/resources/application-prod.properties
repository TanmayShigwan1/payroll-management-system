# Production Configuration for Vercel Deployment
server.port=${PORT:8080}
spring.profiles.active=prod

# Database Configuration (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/payroll_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.payroll=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR

# CORS Configuration for Vercel
cors.allowed.origins=${CORS_ORIGINS:*}

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123!@#ForPayrollSystem2024}
jwt.expirationMs=${JWT_EXPIRATION:86400000}

# Application Configuration
app.name=Payroll Management System
app.version=1.0.0
app.environment=production

# Disable unnecessary features for production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
