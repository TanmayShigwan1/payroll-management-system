server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: payroll-management-system
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/payroll_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:payroll}
    password: ${DB_PASSWORD:payroll123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # H2 Database (for development/testing)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:payrollSecretKey2023ForAuthentication}
  expiration: 86400000 # 24 hours in milliseconds

# File Upload Configuration
file:
  upload:
    dir: ./uploads/

# Logging Configuration
logging:
  level:
    com.payroll: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/payroll-app.log

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
